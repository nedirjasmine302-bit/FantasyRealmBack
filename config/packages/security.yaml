security:
  # https://symfony.com/doc/current/security.html#registering-the-user-hashing-passwords
  password_hashers:
    App\Entity\User:
      algorithm: auto

  # Hiérarchie des rôles : chaque niveau hérite des droits du niveau en dessous.
  # ROLE_ADMIN peut tout faire, ROLE_EMPLOYER peut ce que peut un joueur, etc.
  role_hierarchy:
    ROLE_EMPLOYER: ROLE_USER
    ROLE_ADMIN: ROLE_EMPLOYER

  # https://symfony.com/doc/current/security.html#loading-the-user-the-user-provider
  providers:
    app_user_provider:
      entity:
        class: App\Entity\User
        property: email

  firewalls:
    dev:
      # Ensure dev tools and static assets are always allowed
      pattern: ^/(_profiler|_wdt|assets|build)/
      security: false

    # main:
      # lazy: true
      # provider: users_in_memory

    api:
      pattern: ^/api
      stateless: true
      provider: app_user_provider
      jwt: ~

      # Activate different ways to authenticate:
      # https://symfony.com/doc/current/security.html#the-firewall

      # https://symfony.com/doc/current/security/impersonating_user.html
      # switch_user: true

  # Note: Only the *first* matching rule is applied
  access_control:
    # - { path: ^/admin, roles: ROLE_ADMIN }
    # - { path: ^/profile, roles: ROLE_USER }

    # Sign-in accessible sans être connecté
    - { path: ^/api/auth/sign-in, methods: [POST], roles: PUBLIC_ACCESS }

    # Sign-up accessible sans être connecté
    - { path: ^/api/sign-up, methods: [POST], roles: PUBLIC_ACCESS }

    # Vérification d'unicité email/pseudo accessible sans être connecté
    - { path: ^/api/check-email, methods: [GET], roles: PUBLIC_ACCESS }
    - { path: ^/api/check-pseudo, methods: [GET], roles: PUBLIC_ACCESS }

    # Forgot password & vérifications accessibles sans être connecté
    - { path: ^/api/users/check-email, methods: [GET], roles: PUBLIC_ACCESS }
    - { path: ^/api/users/check-identity, methods: [GET], roles: PUBLIC_ACCESS }
    - { path: ^/api/auth/forgot-password, methods: [POST], roles: PUBLIC_ACCESS }

    # Reset password avec mot de passe temporaire
    - { path: ^/api/auth/verify-temp-password, methods: [POST], roles: PUBLIC_ACCESS }
    - { path: ^/api/auth/reset-password, methods: [POST], roles: PUBLIC_ACCESS }

    # Formulaire de contact : accessible aux visiteurs comme aux membres
    - { path: ^/api/contact, methods: [POST], roles: PUBLIC_ACCESS }

    # Consultation des personnages en lecture seule : accessible aux visiteurs.
    - { path: ^/api/characters, methods: [GET], roles: PUBLIC_ACCESS }

    # Le reste des /api nécessite un JWT valide
    - { path: ^/api, roles: IS_AUTHENTICATED_FULLY }

when@test:
  security:
    password_hashers:
      # Password hashers are resource-intensive by design to ensure security.
      # In tests, it's safe to reduce their cost to improve performance.
      Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
        algorithm: auto
        cost: 4        # Lowest possible value for bcrypt
        time_cost: 3   # Lowest possible value for argon
        memory_cost: 10 # Lowest possible value for argon
